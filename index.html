<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDITORIAL TASKS | 编辑式任务管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #faf9f7;
            --color-paper: #ffffff;
            --color-ink: #1a1a1a;
            --color-ink-light: #666666;
            --color-border: #1a1a1a;
            --color-accent-high: #dc2626;
            --color-accent-medium: #b45309;
            --color-accent-low: #15803d;
            --color-muted: #e5e5e5;
            --font-display: 'Playfair Display', Georgia, serif;
            --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-mono);
            background: var(--color-bg);
            color: var(--color-ink);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* 杂志封面式头部 */
        .masthead {
            background: var(--color-ink);
            color: var(--color-paper);
            padding: 3rem 2rem 2rem;
            position: relative;
            overflow: hidden;
        }

        .masthead::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: repeating-linear-gradient(
                90deg,
                var(--color-accent-high) 0px,
                var(--color-accent-high) 33.33%,
                var(--color-accent-medium) 33.33%,
                var(--color-accent-medium) 66.66%,
                var(--color-accent-low) 66.66%,
                var(--color-accent-low) 100%
            );
        }

        .masthead-content {
            max-width: 900px;
            margin: 0 auto;
        }

        .edition-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.7;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 0.75rem;
        }

        .masthead-title {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1;
            margin-bottom: 0.5rem;
            animation: slideIn 0.8s ease-out;
        }

        .masthead-subtitle {
            font-size: 0.875rem;
            opacity: 0.8;
            max-width: 400px;
            animation: slideIn 0.8s ease-out 0.1s both;
        }

        /* 统计栏 - 报纸风格 */
        .stats-banner {
            background: var(--color-paper);
            border-bottom: 2px solid var(--color-border);
            padding: 1rem 2rem;
        }

        .stats-inner {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }

        .stat-box {
            text-align: center;
            position: relative;
        }

        .stat-box:not(:last-child)::after {
            content: '';
            position: absolute;
            right: -1rem;
            top: 50%;
            transform: translateY(-50%);
            width: 1px;
            height: 60%;
            background: var(--color-muted);
        }

        .stat-number {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 600;
            line-height: 1;
            display: block;
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--color-ink-light);
            margin-top: 0.25rem;
        }

        /* 主要内容区 */
        .main-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* 输入区 - 编辑框风格 */
        .editor-section {
            background: var(--color-paper);
            border: 2px solid var(--color-border);
            margin-bottom: 2rem;
            position: relative;
        }

        .editor-header {
            background: var(--color-border);
            color: var(--color-paper);
            padding: 0.5rem 1rem;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-body {
            padding: 1.5rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .task-input {
            flex: 1;
            min-width: 200px;
            border: none;
            border-bottom: 2px solid var(--color-muted);
            background: transparent;
            font-family: var(--font-mono);
            font-size: 1rem;
            padding: 0.75rem 0;
            outline: none;
            transition: border-color 0.2s;
        }

        .task-input:focus {
            border-color: var(--color-accent-medium);
        }

        .task-input::placeholder {
            color: var(--color-ink-light);
            font-style: italic;
        }

        .priority-select {
            font-family: var(--font-mono);
            border: 2px solid var(--color-border);
            background: var(--color-paper);
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            cursor: pointer;
            outline: none;
            min-width: 100px;
        }

        .btn-add {
            background: var(--color-border);
            color: var(--color-paper);
            border: none;
            padding: 0.75rem 2rem;
            font-family: var(--font-mono);
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-add:hover {
            background: var(--color-accent-medium);
            transform: translateY(-2px);
            box-shadow: 4px 4px 0 var(--color-border);
        }

        .btn-add:active {
            transform: translateY(0);
            box-shadow: 2px 2px 0 var(--color-border);
        }

        /* 任务列表 - 文章列表风格 */
        .section-title {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--color-border);
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .task-item {
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            gap: 1rem;
            align-items: center;
            padding: 1.25rem;
            background: var(--color-paper);
            border: 1px solid var(--color-muted);
            border-bottom: none;
            position: relative;
            transition: all 0.2s;
            animation: slideIn 0.4s ease-out both;
        }

        .task-item:last-child {
            border-bottom: 1px solid var(--color-muted);
        }

        .task-item:hover {
            background: #fefefe;
            z-index: 1;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .task-item.task-done {
            opacity: 0.6;
        }

        .task-item.task-done .task-text {
            text-decoration: line-through;
            color: var(--color-ink-light);
        }

        /* 复选框 - 粗野主义风格 */
        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--color-border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .checkbox:hover {
            background: var(--color-muted);
        }

        .checkbox.checked {
            background: var(--color-border);
        }

        .checkbox.checked svg {
            width: 14px;
            height: 14px;
            color: var(--color-paper);
        }

        .task-text {
            font-size: 0.9375rem;
            line-height: 1.5;
            word-break: break-word;
        }

        .task-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        /* 优先级标签 */
        .priority-tag {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 0.35rem 0.6rem;
            border: 1px solid;
            white-space: nowrap;
        }

        .priority-high {
            color: var(--color-accent-high);
            border-color: var(--color-accent-high);
            background: rgba(220, 38, 38, 0.05);
        }

        .priority-medium {
            color: var(--color-accent-medium);
            border-color: var(--color-accent-medium);
            background: rgba(180, 83, 9, 0.05);
        }

        .priority-low {
            color: var(--color-accent-low);
            border-color: var(--color-accent-low);
            background: rgba(21, 128, 61, 0.05);
        }

        /* 删除按钮 */
        .delete-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .task-item:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            background: var(--color-accent-high);
            border-color: var(--color-accent-high);
        }

        .delete-btn:hover svg {
            color: var(--color-paper);
        }

        .delete-btn svg {
            width: 16px;
            height: 16px;
            color: var(--color-ink-light);
        }

        /* 空状态 */
        .empty-state {
            padding: 4rem 2rem;
            text-align: center;
            background: var(--color-paper);
            border: 1px solid var(--color-muted);
        }

        .empty-state-text {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-style: italic;
            color: var(--color-ink-light);
            margin-bottom: 0.5rem;
        }

        .empty-state-sub {
            font-size: 0.875rem;
            color: var(--color-ink-light);
        }

        /* 筛选器 */
        .filter-section {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 2px solid var(--color-border);
        }

        .filter-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--color-ink-light);
            margin-bottom: 0.75rem;
        }

        .filter-tabs {
            display: flex;
            gap: 0;
        }

        .filter-btn {
            background: var(--color-paper);
            border: 1px solid var(--color-muted);
            border-right: none;
            padding: 0.75rem 1.5rem;
            font-family: var(--font-mono);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:last-child {
            border-right: 1px solid var(--color-muted);
        }

        .filter-btn:hover {
            background: var(--color-bg);
        }

        .filter-btn.active {
            background: var(--color-border);
            color: var(--color-paper);
            border-color: var(--color-border);
        }

        /* 错误提示 */
        .error-toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--color-accent-high);
            color: var(--color-paper);
            padding: 1rem 2rem;
            font-size: 0.875rem;
            font-weight: 500;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
            opacity: 0;
            transition: all 0.3s;
            z-index: 100;
        }

        .error-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* 动画 */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes typewriter {
            from { width: 0; }
            to { width: 100%; }
        }

        /* 响应式 */
        @media (max-width: 640px) {
            .masthead {
                padding: 2rem 1rem 1.5rem;
            }

            .stats-inner {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .stat-box:not(:last-child)::after {
                display: none;
            }

            .main-content {
                padding: 1rem;
            }

            .editor-body {
                flex-direction: column;
            }

            .task-input {
                min-width: 100%;
            }

            .task-item {
                grid-template-columns: auto 1fr;
                grid-template-rows: auto auto;
            }

            .task-meta {
                grid-column: 2;
                justify-content: flex-start;
            }

            .delete-btn {
                opacity: 1;
                grid-column: 2;
                justify-self: end;
            }

            .filter-tabs {
                flex-wrap: wrap;
            }

            .filter-btn {
                border-right: 1px solid var(--color-muted);
                flex: 1;
                min-width: 80px;
            }
        }
    </style>
</head>
<body>
    <!-- 杂志头版 -->
    <header class="masthead">
        <div class="masthead-content">
            <div class="edition-info">
                <span id="currentDate">TODAY'S EDITION</span>
                <span>VOL. 01</span>
            </div>
            <h1 class="masthead-title">Editorial<br>Tasks</h1>
            <p class="masthead-subtitle">以编辑的严谨态度对待每一个任务。记录、执行、归档。</p>
        </div>
    </header>

    <!-- 统计栏 -->
    <div class="stats-banner">
        <div class="stats-inner">
            <div class="stat-box">
                <span class="stat-number" id="statTotal">0</span>
                <span class="stat-label">Total Articles</span>
            </div>
            <div class="stat-box">
                <span class="stat-number" id="statActive">0</span>
                <span class="stat-label">In Progress</span>
            </div>
            <div class="stat-box">
                <span class="stat-number" id="statCompleted">0</span>
                <span class="stat-label">Published</span>
            </div>
        </div>
    </div>

    <!-- 主要内容 -->
    <main class="main-content">
        <!-- 编辑输入区 -->
        <section class="editor-section">
            <div class="editor-header">
                <span>New Entry</span>
                <span id="charCount">0/500</span>
            </div>
            <div class="editor-body">
                <input type="text" id="taskInput" class="task-input" placeholder="输入任务内容...">
                <select id="prioritySelect" class="priority-select">
                    <option value="高">URGENT</option>
                    <option value="中" selected>NORMAL</option>
                    <option value="低">LOW</option>
                </select>
                <button class="btn-add" onclick="addTask()">
                    Publish
                </button>
            </div>
        </section>

        <!-- 任务列表 -->
        <section>
            <h2 class="section-title">Articles</h2>
            <div class="task-list" id="taskList">
                <!-- Tasks will be loaded here -->
            </div>
        </section>

        <!-- 筛选器 -->
        <section class="filter-section">
            <div class="filter-label">View by Status</div>
            <div class="filter-tabs">
                <button class="filter-btn active" onclick="setFilter('all')" id="filter-all">All</button>
                <button class="filter-btn" onclick="setFilter('active')" id="filter-active">Draft</button>
                <button class="filter-btn" onclick="setFilter('completed')" id="filter-completed">Published</button>
            </div>
        </section>
    </main>

    <!-- 错误提示 -->
    <div class="error-toast" id="errorToast"></div>

    <script src="app.js"></script>
    <script>
        // 设置当前日期
        const dateOptions = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('zh-CN', dateOptions);

        // 字符计数
        const taskInput = document.getElementById('taskInput');
        const charCount = document.getElementById('charCount');
        taskInput.addEventListener('input', () => {
            charCount.textContent = `${taskInput.value.length}/500`;
        });
    </script>
</body>
</html>
