# Render 部署配置 - Flask 版本
# 访问 https://dashboard.render.com/ 创建服务

services:
  - type: web
    name: todo-app
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: todo-db
          property: connectionString

databases:
  - name: todo-db
    plan: free
    ipAllowList: []
