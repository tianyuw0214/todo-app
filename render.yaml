# Render 部署配置 - 前后端合并部署
# 访问 https://dashboard.render.com/ 创建服务

services:
  # 合并部署：后端 API + 前端静态文件
  - type: web
    name: todo-app
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: todo-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: todo-db
    plan: free
    ipAllowList: []  # 允许所有 IP 访问
